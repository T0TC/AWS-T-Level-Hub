<!--
  Amazon T-Level Hub — Shared Icon Sprite
  ----------------------------------------
  Single source of truth for every icon used across the site.
  Style matches the existing inline SVGs already used for course icons
  (application.html / resources.html): 24x24 viewBox, 2px stroke,
  square line caps/joins, no fill, colour inherited via `currentColor`.

  This file is also embedded inline inside assets/icons.js (as ICON_SPRITE)
  so icons keep working even when pages are opened directly from disk
  (file://) rather than served from a webserver, where <use href="icons.svg#x">
  across documents can be blocked. Keep both copies in sync — edit here first,
  then run the sync step described at the top of icons.js.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">

  <symbol id="icon-close" viewBox="0 0 24 24">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>

  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
